<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradiente_naranja" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d35400;stop-opacity:1" />
    </linearGradient>
    <filter id="sombra_suave" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <path d="M250 30 L450 140 L450 360 L250 470 L50 360 L50 140 Z" fill="url(#gradiente_naranja)" stroke="#e67e22" stroke-width="8" filter="url(#sombra_suave)"/>
  
  <path d="M250 50 L430 155 L430 345 L250 450 L70 345 L70 155 Z" fill="none" stroke="#f1c40f" stroke-width="4" opacity="0.6"/>

  <path d="M50 160 C 10 180 10 320 50 340 L 50 160 Z" fill="#e67e22" opacity="0.8"/>
  <path d="M450 160 C 490 180 490 320 450 340 L 450 160 Z" fill="#e67e22" opacity="0.8"/>

  <g fill="white">
    <circle cx="210" cy="180" r="22" />
    <circle cx="290" cy="180" r="22" />
    
    <circle cx="170" cy="260" r="22" />
    <circle cx="250" cy="260" r="25" /> <circle cx="330" cy="260" r="22" />
    
    <circle cx="210" cy="340" r="22" />
    <circle cx="290" cy="340" r="22" />

    <g stroke="white" stroke-width="3" opacity="0.5">
        <line x1="210" y1="180" x2="290" y2="180" />
        <line x1="170" y1="260" x2="250" y2="260" />
        <line x1="250" y1="260" x2="330" y2="260" />
        <line x1="210" y1="340" x2="290" y2="340" />
        <line x1="210" y1="180" x2="170" y2="260" />
        <line x1="290" y1="180" x2="330" y2="260" />
        <line x1="170" y1="260" x2="210" y2="340" />
        <line x1="330" y1="260" x2="290" y2="340" />
    </g>
  </g>
</svg>
