<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradiente_rojo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff2e93;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0000;stop-opacity:1" />
    </linearGradient>
    <filter id="sombra_suave" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <path d="M250 30 L450 140 L450 360 L250 470 L50 360 L50 140 Z" fill="url(#gradiente_rojo)" stroke="#ff0055" stroke-width="8" filter="url(#sombra_suave)"/>
  
  <path d="M250 50 L430 155 L430 345 L250 450 L70 345 L70 155 Z" fill="none" stroke="#ff4d4d" stroke-width="4" opacity="0.6"/>

  <path d="M50 160 C 10 180 10 320 50 340 L 50 160 Z" fill="#ff0055" opacity="0.8"/>
  <path d="M450 160 C 490 180 490 320 450 340 L 450 160 Z" fill="#ff0055" opacity="0.8"/>

  <!-- Icono de Calavera / Anomalia digital -->
  <g fill="white" transform="translate(150, 130)">
    <!-- Cráneo principal -->
    <path d="M100 20 C40 20 20 60 20 110 C20 160 40 170 60 170 C60 190 70 210 100 210 C130 210 140 190 140 170 C160 170 180 160 180 110 C180 60 160 20 100 20 Z" />
    <!-- Ojos -->
    <circle cx="65" cy="100" r="22" fill="#7f0000" />
    <circle cx="135" cy="100" r="22" fill="#7f0000" />
    <!-- Ojos brillo -->
    <circle cx="65" cy="100" r="8" fill="#ff0055" />
    <circle cx="135" cy="100" r="8" fill="#ff0055" />
    <!-- Cavidad Nasal -->
    <polygon points="100,125 90,145 110,145" fill="#7f0000" />
    <!-- Dientes -->
    <rect x="75" y="180" width="10" height="20" rx="3" fill="#7f0000" />
    <rect x="95" y="180" width="10" height="20" rx="3" fill="#7f0000" />
    <rect x="115" y="180" width="10" height="20" rx="3" fill="#7f0000" />
    <!-- Rayos/Glitch extras -->
    <path d="M-20 40 L-50 60 M220 40 L250 60" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <path d="M-30 150 L-60 140 M230 150 L260 140" stroke="white" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
